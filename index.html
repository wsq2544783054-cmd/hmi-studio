<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World Test</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
    background-color: #f0f0f0;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 20px;
  }

  p {
    font-size: 18px;
    margin-bottom: 30px;
  }

  .emoji-container span {
    font-size: 36px;
    margin: 10px;
    cursor: pointer;
  }

  .btn-container button {
    padding: 12px 18px;
    margin: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }

  .btn1 { background: #4CAF50; color: white; }
  .btn2 { background: #2196F3; color: white; }
  .btn3 { background: #ff5722; color: white; }
</style>

</head>

<body>

<h1>Hello World 😄</h1>
<p>Click anywhere you like!</p>

<div class="emoji-container">
  <span>😂</span>
  <span>😍</span>
  <span>🔥</span>
  <span>👍</span>
  <span>💖</span>
</div>

<div class="btn-container">
  <button class="btn1">Click Me</button>
  <button class="btn2">Try Again</button>

</html>
